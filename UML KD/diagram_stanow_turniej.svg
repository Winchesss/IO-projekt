<svg xmlns="http://www.w3.org/2000/svg" width="900" height="720" viewBox="0 0 900 720" style="background-color:#ffffff;" content="&lt;mxfile host=&quot;app.diagrams.net&quot; modified=&quot;2026-06-11T00:00:00.000Z&quot; agent=&quot;ChatGPT&quot; version=&quot;24.7.17&quot; type=&quot;device&quot;&gt;&lt;diagram name=&quot;Page-1&quot;&gt;UML state machine diagram - Turniej Szachowy&lt;/diagram&gt;&lt;/mxfile&gt;">
  <defs>
