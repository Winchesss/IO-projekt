<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#eeeeee" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111" />
    </marker>
    <style><![CDATA[
      .bg { fill: #fff; }
      .grid { fill: url(#grid); }
      .box { fill: #fff; stroke: #111; stroke-width: 1.4; }
      .header { fill: #fff; stroke: #111; stroke-width: 1.4; }
      .title { font: 700 18px Arial, Helvetica, sans-serif; fill: #000; }
      .enumTitle { font: 700 16px Arial, Helvetica, sans-serif; fill: #000; }
      .stereo { font: 14px Arial, Helvetica, sans-serif; fill: #000; }
      .attr { font: 15px Arial, Helvetica, sans-serif; fill: #000; }
      .line { fill: none; stroke: #111; stroke-width: 1.4; }
      .dash { fill: none; stroke: #111; stroke-width: 1.4; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .label { font: 14px Arial, Helvetica, sans-serif; fill: #000; }
      .mult { font: 15px Arial, Helvetica, sans-serif; fill: #000; }
    ]]></style>
  </defs>
