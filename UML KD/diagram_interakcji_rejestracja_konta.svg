<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <marker id="arrowSolid" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222222"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11" fill="none" stroke="#222222" stroke-width="1.6" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #111; }
      .label { font: 700 16px Arial, Helvetica, sans-serif; fill: #111; }
      .txt { font: 400 14px Arial, Helvetica, sans-serif; fill: #111; }
      .small { font: 400 13px Arial, Helvetica, sans-serif; fill: #111; }
      .box { fill: #f7f7f7; stroke: #222222; stroke-width: 1.5; rx: 10; ry: 10; }
      .lifeline { stroke: #222222; stroke-width: 1.5; stroke-dasharray: 8 7; }
      .arrow { stroke: #222222; stroke-width: 2; fill: none; marker-end: url(#arrowSolid); }
      .return { stroke: #222222; stroke-width: 1.8; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrowOpen); }
      .activate { fill: #e9e9e9; stroke: #222222; stroke-width: 1.2; }
    </style>
  </defs>
  <rect x="0" y="0" width="1280" height="760" fill="#f2f2f2"/>
  <text x="640.0" y="36" text-anchor="middle" class="title">Diagram interakcji - Rejestracja konta</text>
<rect x="55.0" y="70" width="170" height="44" rx="10" ry="10" class="box"/><text x="140" y="97" text-anchor="middle" class="label">Gość</text><line x1="140" y1="114" x2="140" y2="690" class="lifeline"/><rect x="335.0" y="70" width="170" height="44" rx="10" ry="10" class="box"/><text x="420" y="97" text-anchor="middle" class="label">Interfejs</text><line x1="420" y1="114" x2="420" y2="690" class="lifeline"/><rect x="635.0" y="70" width="170" height="44" rx="10" ry="10" class="box"/><text x="720" y="97" text-anchor="middle" class="label">System</text><line x1="720" y1="114" x2="720" y2="690" class="lifeline"/><rect x="945.0" y="70" width="170" height="44" rx="10" ry="10" class="box"/><text x="1030" y="97" text-anchor="middle" class="label">Baza danych</text><line x1="1030" y1="114" x2="1030" y2="690" class="lifeline"/><circle cx="140" cy="55" r="12" fill="none" stroke="#222222" stroke-width="2"/><line x1="140" y1="67" x2="140" y2="95" stroke="#222222" stroke-width="2"/><line x1="122" y1="78" x2="158" y2="78" stroke="#222222" stroke-width="2"/><line x1="140" y1="95" x2="124" y2="118" stroke="#222222" stroke-width="2"/><line x1="140" y1="95" x2="156" y2="118" stroke="#222222" stroke-width="2"/><rect x="412.0" y="170" width="16" height="140" class="activate"/><rect x="712.0" y="242" width="16" height="280" class="activate"/><rect x="1022.0" y="386" width="16" height="86" class="activate"/><rect x="412.0" y="530" width="16" height="86" class="activate"/><line x1="140" y1="170" x2="420" y2="170" class="arrow"/><text x="280.0" y="156.0" text-anchor="middle" class="txt">wypełnienie formularza rejestracyjnego</text><line x1="420" y1="242" x2="720" y2="242" class="arrow"/><text x="570.0" y="228.0" text-anchor="middle" class="txt">przekazanie danych</text><path d="M 720 314 h 90 v 36 h -90" class="arrow"/><text x="772" y="302.0" text-anchor="middle" class="txt">walidacja danych</text><line x1="720" y1="386" x2="1030" y2="386" class="arrow"/><text x="875.0" y="372.0" text-anchor="middle" class="txt">zapis konta</text><line x1="1030" y1="458" x2="720" y2="458" class="return"/><text x="875.0" y="444.0" text-anchor="middle" class="txt">potwierdzenie zapisu</text><line x1="720" y1="530" x2="420" y2="530" class="return"/><text x="570.0" y="516.0" text-anchor="middle" class="txt">komunikat o powodzeniu lub błędzie</text><line x1="420" y1="602" x2="140" y2="602" class="return"/><text x="280.0" y="580.0" text-anchor="middle" class="txt">prezentacja potwierdzenia utworzenia konta<tspan x="280.0" dy="16">albo komunikatu błędu</tspan></text><rect x="770" y="620" width="420" height="78" rx="10" ry="10" class="box"/><text x="980.0" y="645.0" text-anchor="middle" class="small">Scenariusz: po poprawnej walidacji system zapisuje konto w bazie danych,<tspan x="980.0" dy="16">a następnie zwraca do interfejsu komunikat o powodzeniu lub błędzie.</tspan></text></svg>